name: Build and Test

on:
  push:
    branches: [main, master, 001-storage-rack-organiser]
  pull_request:
    branches: [main, master, 001-storage-rack-organiser]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build-tools
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;34.0.0" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: Run unit tests (shared + androidApp)
        run: ./gradlew :shared:allTests :androidApp:testDebugUnitTest --no-daemon

      - name: Assemble debug
        run: ./gradlew :androidApp:assembleDebug --no-daemon

build:
  maxIssues: 0
  weights:
    # complexity: 2
    # LongParameterList: 1
    # style: 1
    # comments: 1

processors:
  active: true
  exclude:
    # Exclude processors that are not relevant for this project
    - 'FunctionCountProcessor'
    - 'PropertyCountProcessor'
    - 'ClassCountProcessor'
    - 'PackageCountProcessor'
    - 'KtFileCountProcessor'

console-reports:
  active: true
  exclude:
  include:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'

output-reports:
  active: true
  exclude:
  include:
    - 'txt:reports/detekt/detekt.txt'
    - 'xml:reports/detekt/detekt.xml'
    - 'html:reports/detekt/detekt.html'

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    ignoreSingleWhenExpression: false
    ignoreSimpleWhenEntries: false
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    threshold: 6
    ignoreDefaultParameters: true
  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: true
    threshold: 10
    thresholdInClasses: 10
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 10
  NestingDepth:
    active: true
    threshold: 4

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
    excludes: ['Composable']
  PackageNaming:
    active: true
    packagePattern: '^[a-z]+(\.[a-z][a-z0-9]*)*$'
  FunctionNaming:
    active: true
    functionPattern: '^([a-z][a-zA-Z0-9]*)|(`.*`)$'
    excludeClassPattern: '$^'
    ignoreOverriddenFunction: true
  VariableNaming:
    active: true
    variablePattern: '^[a-z][a-zA-Z0-9]*$'
    privateVariablePattern: '^(_)?[a-z][a-zA-Z0-9]*$'
    excludeClassPattern: '$^'
    ignoreOverriddenFunction: true
  ConstantNaming:
    active: true
    constantPattern: '^[A-Z][A-Z_0-9]*$'
    privateConstantPattern: '^(_)?[A-Z][A-Z_0-9]*$'
    acceptableConstantNames: ['Composable']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '^[A-Z][A-Z_0-9]*$'
    privateConstantPattern: '^(_)?[A-Z][A-Z_0-9]*$'
    propertyPattern: '^[a-z][a-zA-Z0-9]*$'
    privatePropertyPattern: '^(_)?[a-z][a-zA-Z0-9]*$'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: false
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: false
    ignoreAnnotation: false
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: false
    ignoreExtensionFunctions: false
    ignoreDataClasses: false
    ignoreSealedClasses: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: false
    excludeImportStatements: false
    excludeCommentStatements: false
  NewLineAtEndOfFile:
    active: true
  TrailingWhitespace:
    active: true
  ReturnCount:
    active: true
    max: 3
    maxForFunctions: 3
    maxForMethods: 3
    excludedFunctions: ['equals', 'toString']
    excludedMethods: ['equals', 'toString']
  WildcardImport:
    active: true
    excludeImports: ['java.util.*', 'kotlinx.coroutines.*']
  ModifierOrder:
    active: true
  UnusedImports:
    active: true
  ExpressionBodySyntax:
    active: true
    expressionBodyThreshold: 4
  OptionalWhenBraces:
    active: true
  OptionalAbstractKeyword:
    active: true
  RedundantVisibilityModifierRule:
    active: true
  SafeCast:
    active: true
  UnnecessaryParentheses:
    active: true
  UnnecessaryAbstractClass:
    active: true
  UnnecessaryApply:
    active: true
  UnnecessaryInheritance:
    active: true
  UnnecessaryLet:
    active: true
  UnusedPrivateMember:
    active: true
    searchInNestedClass: true
    searchInInnerClass: true
    searchInInnerObject: true
    searchInInnerInterface: true
    ignoreAnnotated: ['Suppress', 'VisibleForTesting']
  UseCheckOrError:
    active: true
  UseRequire:
    active: true
  UseRequireNotNull:
    active: true
  UseDataClass:
    active: true
  UseIfInsteadOfWhen:
    active: true
  UseIsNullOrEmpty:
    active: true
  UseOrEmpty:
    active: true
  UseSafeCall:
    active: true
  UseWhenInsteadOfIf:
    active: true

comments:
  active: true
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

potential-bugs:
  active: true
  UnreachableCode:
    active: true
  UnusedPrivateMember:
    active: true
    searchInNestedClass: true
    searchInInnerClass: true
    searchInInnerObject: true
    searchInInnerInterface: true
    ignoreAnnotated: ['Suppress', 'VisibleForTesting']
  UnusedPrivateClass:
    active: true
  UnusedPrivateProperty:
    active: true
  UnusedPrivateFunction:
    active: true
  UnusedReturnValue:
    active: true
  UnusedVariable:
    active: true
  UnusedImport:
    active: true
  UnusedExpression:
    active: true

coroutines:
  active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunWithFlowReturnType:
    active: true
  SwallowedException:
    active: true
  UnnecessaryCoroutine:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
  EmptyClassBlock:
    active: true
  EmptyDefaultConstructor:
    active: true
  EmptyDoWhileBlock:
    active: true
  EmptyElseBlock:
    active: true
  EmptyFinallyBlock:
    active: true
  EmptyForBlock:
    active: true
  EmptyFunctionBlock:
    active: true
  EmptyIfBlock:
    active: true
  EmptyInitBlock:
    active: true
  EmptyKotlinFile:
    active: true
  EmptySecondaryConstructor:
    active: true
  EmptyWhenBlock:
    active: true
  EmptyWhileBlock:
    active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames: ['ArrayIndexOutOfBoundsException', 'Error', 'Exception', 'IllegalMonitorStateException', 'IndexOutOfBoundsException', 'NullPointerException', 'Throwable']
  TooGenericExceptionThrown:
    active: true
    exceptionNames: ['ArrayIndexOutOfBoundsException', 'Error', 'Exception', 'IllegalMonitorStateException', 'IndexOutOfBoundsException', 'NullPointerException', 'Throwable']
  ExceptionRaisedInUnexpectedLocation:
    active: true
    methodNames: ['equals', 'hashCode', 'toString', 'finalize']
  SwallowedException:
    active: true
    ignoredExceptionTypes: ['InterruptedException', 'NumberFormatException']
    allowedExceptionNameRegex: '^(ignore|expected).*'
    exceptionMessageRegex: '.*(ignore|expected).*'

performance:
  active: true
  SpreadOperator:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true
  ForEachOnRange:
    active: true
  UnnecessaryPartOfBinaryExpression:
    active: true
  UnnecessaryStringTemplate:
    active: true
  UnnecessaryVariable:
    active: true
